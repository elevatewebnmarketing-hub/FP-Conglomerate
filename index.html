    <meta name="description" content="FP Conglomerate is a multi-industry organization spanning faith, technology, real estate, media, and humanitarian services. Building trust across industries." />
    <meta name="author" content="FP Conglomerate" />

    <meta property="og:title" content="FP Conglomerate — Trust, Service, Excellence" />

    <meta name="twitter:card" content="summary_large_image" />

    <script>
      (function () {
        var k = "fp-conglomerate-ui-theme";
        try {
          var v = localStorage.getItem(k);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var useDark = v === "dark" || (v !== "light" && prefersDark);
          document.documentElement.classList.toggle("dark", useDark);
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
